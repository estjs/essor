interface:
  display_name: "Writing Essor Apps"
  short_description: "Write Essor apps with correct $ reactivity, SSR/hydration, components, resources, stores, and public imports"
  default_prompt: "Use writing-essor-apps when writing or revising Essor app, example, demo, page, or entry-file code. Do not use it for babel-plugin, runtime, server, signals, template, or other packages/*/src internals. Essor is a signal-based frontend framework with no virtual DOM. `$`-prefixed locals are compiler-transformed reactive state; unprefixed locals are plain JavaScript. Use createApp only for client-only apps, hydrate for SSR/SSG client entries, and renderToString or renderToStringAsync from @estjs/server for server output. Do not use renderToStream in Essor 0.0.16-beta.8. Component-scoped effect() is auto-disposed by Essor scope; clean timers/listeners/sockets with lifecycle hooks. Framework imports come from essor and @estjs/server; local app modules and platform APIs are allowed where appropriate."
