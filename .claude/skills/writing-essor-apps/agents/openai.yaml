interface:
  display_name: "Writing Essor Apps"
  short_description: "Write Essor reactive apps with correct $ prefix, rendering mode, SSR/hydration, component patterns, and import boundaries"
  default_prompt: "Use $writing-essor-apps to write or revise Essor app code. Essor is a signal-based reactive frontend framework with no virtual DOM. The `$` prefix auto-transforms variables into reactive signals. Ensure correct rendering mode (createApp for client-only, hydrate for SSR/SSG, renderToString for server), the SSR/hydration contract (identical initial HTML), component patterns (For, Suspense, Portal, createResource, defineAsyncComponent), and public import boundaries (essor / @estjs/server)."
