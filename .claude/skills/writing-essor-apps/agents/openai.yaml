interface:
  display_name: "Writing Essor Apps"
  short_description: "Write Essor apps with correct $ reactivity, SSR/hydration, components, resources, stores, and public imports"
  default_prompt: |
    Use writing-essor-apps when writing or revising Essor app, example, demo, page, or entry-file code.
    Do not use it for babel-plugin, runtime, server, signals, template, or other packages/*/src internals.
    Source of truth: agents/AGENTS.md. Key rules:
    - $-prefixed locals are compiler-transformed reactive state; no $ = plain JavaScript.
    - Mutate reactive arrays/objects in place; never replace with spread clones.
    - createApp() for client-only; hydrate() for SSR/SSG.
    - renderToString() / renderToStringAsync() from @estjs/server; no renderToStream in 0.0.16-beta.8.
    - Shared render must be deterministic; browser-only work in onMount().
    - Component-scoped effect() is auto-disposed; onDestroy() for timers/listeners/sockets.
    - watch(() => $x, cb) — source must be a reactive getter.
    - Fragment / <> for multiple root nodes.
    - For with key for reorderable lists; Suspense for async resources.
    - Imports from essor and @estjs/server only; local app modules and platform APIs are allowed.
